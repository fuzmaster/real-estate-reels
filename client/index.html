<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Real Estate Reels — Listing Videos for Agents in Minutes</title>
    <meta name="description" content="Turn listing photos into branded Instagram Reels, TikToks, and YouTube Shorts in minutes. Just Listed, Open House, and Just Sold templates for real estate agents and brokerages." />
    <meta name="keywords" content="real estate reels, listing video maker, just listed video, open house video, real estate Instagram reels, real estate TikTok, real estate social media video" />
    <meta name="author" content="Real Estate Reels" />
    <link rel="canonical" href="https://realestatereels.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Real Estate Reels — Listing Videos in Minutes" />

    <meta property="og:site_name" content="Real Estate Reels" />

    <meta name="twitter:image" content="/og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Real Estate Reels",
      "description": "Create branded short-form listing videos for Instagram Reels, TikTok, and YouTube Shorts in minutes. Just Listed, Open House, and Just Sold templates.",
      "url": "https://realestatereels.app",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "audience": {
        "@type": "Audience",
        "audienceType": "Real estate agents, brokers, and marketing teams"
      },
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD"
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "29",
          "priceCurrency": "USD",
          "billingIncrement": "month"
        }
      ]
    }
    </script>

    <link rel="icon" type="image/png" href="/icon-512.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
